name: Build Android Kernel

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ⚠️ IMPORTANT: This permission is required to push code back to the repo
permissions:
  contents: write

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex git gnupg gperf libncurses5-dev \
          libssl-dev libxml2-utils lzop openjdk-11-jdk python3 python3-pip \
          unzip zip zlib1g-dev
       

    # --- SSH Debug Step ---
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false # Recommended: only you can access the session
    # -----------------------

    # --- NEW: Commit and Push Step ---
    - name: Commit and Push Changes
      if: github.event_name != 'pull_request' # Prevents pushing on PRs from forks
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add .
        
        if ! git diff --staged --quiet; then
          git commit -m "Auto-update from CI [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "No changes to commit."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
